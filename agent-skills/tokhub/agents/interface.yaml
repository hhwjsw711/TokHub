interface:
  display_name: "TokHub"
  short_description: "Connect to TokHub with website-equivalent user, workspace, admin, and admin-agent permissions"
  default_prompt: "Use $tokhub to log in to a TokHub instance, inspect the current user's allowed data, and perform a guarded operation only if permitted."
  aliases:
    - "tokhub-admin"
  retired_skill_support:
    tokhub-admin: "Handled by $tokhub admin-agent mode; no standalone tokhub-admin package is shipped."
compatibility:
  canonical_format: "agent-skills"
  adapter_targets:
    - "openai"
    - "claude"
    - "generic"
    - "vscode"
  activation:
    mode: "manual"
    paths: []
  execution:
    context: "inline"
    shell: "bash"
  trust:
    source_tier: "local"
    remote_inline_execution: "forbid"
    remote_metadata_policy: "allow-metadata-only"
  degradation:
    openai: "metadata-adapter"
    claude: "neutral-source-plus-adapter"
    generic: "neutral-source"
    vscode: "agent-skills-source-with-vscode-notes"
